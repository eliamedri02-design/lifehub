<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#faf7f2" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="Life Hub" />
  <link rel="manifest" href="/lifehub/manifest.json" />
  <link rel="apple-touch-icon" href="/lifehub/icon-192.png" />
  <title>Life Hub</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Crimson+Pro:ital,wght@0,300;0,400;0,600;1,300;1,400&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #faf7f2;
      --bg2: #f3ede3;
      --bg3: #ede4d6;
      --bg4: #e4d9c8;
      --border: #d4c8b0;
      --border2: #c0b090;
      --text: #2a2218;
      --text2: #3a3020;
      --text3: #5a4a30;
      --muted: #7a6a50;
      --faint: #9a8a70;
      --ghost: #c0b090;
      --gold: #b8860b;
      --gold2: #d4a020;
      --gold-dim: #8a6010;
      --green: #4a7030;
      --green2: #6a9040;
      --green3: #c8ddb8;
      --blue: #4a6a9a;
      --safe-top: env(safe-area-inset-top, 0px);
      --safe-bot: env(safe-area-inset-bottom, 0px);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    html, body { height: 100%; background: var(--bg); color: var(--text); font-family: 'Crimson Pro', Georgia, serif; overflow: hidden; }

    #app { display: flex; flex-direction: column; height: 100vh; height: 100dvh; }
    #header { padding: calc(var(--safe-top) + 0.9rem) 1.2rem 0; border-bottom: 1px solid var(--bg4); flex-shrink: 0; background: var(--bg); }
    #header-top { display: flex; align-items: baseline; justify-content: space-between; margin-bottom: 0.6rem; }
    #header h1 { font-size: 1.45rem; font-weight: 300; letter-spacing: 0.04em; }
    #header h1 em { color: var(--gold); font-style: italic; }
    #today-label { font-size: 0.7rem; color: var(--faint); letter-spacing: 0.14em; text-transform: uppercase; }
    #tabs { display: flex; }
    .tab-btn { flex: 1; background: none; border: none; border-bottom: 2px solid transparent; padding: 0.55rem 0; font-family: inherit; font-size: 0.75rem; letter-spacing: 0.14em; text-transform: uppercase; color: var(--muted); cursor: pointer; transition: all 0.2s; }
    .tab-btn.active { color: var(--gold); border-bottom-color: var(--gold); }

    #content { flex: 1; overflow-y: auto; overflow-x: hidden; padding: 1.2rem; padding-bottom: calc(var(--safe-bot) + 1.2rem); -webkit-overflow-scrolling: touch; background: var(--bg); }
    .panel { display: none; }
    .panel.active { display: block; }

    .section-label { font-size: 0.65rem; letter-spacing: 0.2em; text-transform: uppercase; color: var(--faint); margin-bottom: 0.55rem; }
    .mono { font-family: 'DM Mono', monospace; }

    .inp { background: var(--bg3); border: 1px solid var(--border); color: var(--text); border-radius: 6px; padding: 0.55rem 0.75rem; font-family: inherit; font-size: 0.95rem; outline: none; transition: border 0.2s; width: 100%; }
    .inp:focus { border-color: var(--gold); }
    input[type="time"].inp { font-family: 'DM Mono', monospace; font-size: 0.85rem; }
    textarea.inp { resize: vertical; line-height: 1.75; }

    .btn { background: var(--gold); color: #fff; border: none; border-radius: 6px; padding: 0.55rem 1.1rem; font-family: inherit; font-size: 0.78rem; letter-spacing: 0.1em; text-transform: uppercase; cursor: pointer; font-weight: 600; transition: background 0.15s; }
    .btn:active { background: var(--gold2); }
    .btn-ghost { background: none; border: 1px solid var(--border); color: var(--text3); border-radius: 6px; padding: 0.45rem 0.85rem; font-family: inherit; font-size: 0.78rem; cursor: pointer; transition: all 0.15s; }
    .btn-ghost:active { border-color: var(--gold); color: var(--gold); }
    .icon-btn { background: none; border: none; color: var(--ghost); cursor: pointer; font-size: 1rem; padding: 0.3rem; line-height: 1; transition: color 0.15s; }
    .icon-btn:active { color: #c04040; }
    .nav-btn { background: none; border: none; color: var(--muted); cursor: pointer; font-size: 1.3rem; padding: 0.3rem 0.6rem; transition: color 0.15s; }
    .nav-btn:active { color: var(--gold); }

    .row { display: flex; align-items: center; gap: 0.5rem; }

    .progress-bar { height: 3px; background: var(--bg4); border-radius: 2px; overflow: hidden; }
    .progress-fill { height: 100%; background: linear-gradient(90deg, var(--gold-dim), var(--gold)); border-radius: 2px; transition: width 0.4s ease; }

    /* CALENDAR */
    #cal-nav { display: flex; align-items: center; justify-content: space-between; margin-bottom: 1rem; }
    #cal-nav span { font-size: 1rem; letter-spacing: 0.08em; }
    #cal-grid { display: grid; grid-template-columns: repeat(7,1fr); gap: 3px; margin-bottom: 0.3rem; }
    .cal-dow { text-align: center; font-size: 0.6rem; color: var(--faint); letter-spacing: 0.08em; text-transform: uppercase; padding: 3px 0; }
    .cal-day { aspect-ratio: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; border-radius: 5px; cursor: pointer; font-size: 0.82rem; gap: 2px; transition: background 0.12s; border: 1px solid transparent; }
    .cal-day:active { background: var(--bg4); }
    .cal-day.today { color: var(--gold); font-weight: 600; }
    .cal-day.selected { background: var(--bg4); border-color: #b8860b50; }
    .cal-day.other-month { color: var(--ghost); pointer-events: none; }
    .dot-row { display: flex; gap: 2px; }
    .dot { width: 4px; height: 4px; border-radius: 50%; }

    #day-detail { margin-top: 1.2rem; border-top: 1px solid var(--bg4); padding-top: 1.2rem; }
    #day-detail-date { font-size: 0.82rem; color: var(--muted); margin-bottom: 1rem; font-style: italic; }

    .event-item { display: flex; align-items: center; justify-content: space-between; padding: 0.5rem 0.65rem; background: var(--bg2); border-radius: 6px; margin-bottom: 0.3rem; gap: 0.5rem; border: 1px solid var(--border); }
    .event-item-left { display: flex; align-items: center; gap: 0.6rem; flex: 1; min-width: 0; }
    .event-time { font-family: 'DM Mono', monospace; font-size: 0.72rem; color: var(--gold); background: var(--bg4); border-radius: 4px; padding: 0.15rem 0.4rem; white-space: nowrap; }
    .event-name { font-size: 0.88rem; color: var(--text2); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .add-form { display: flex; flex-direction: column; gap: 0.4rem; margin-top: 0.6rem; }
    .add-form-row { display: flex; gap: 0.4rem; }

    .mini-habit { display: flex; align-items: center; justify-content: space-between; padding: 0.4rem 0.65rem; border-radius: 6px; cursor: pointer; transition: background 0.12s; }
    .mini-habit:active { background: var(--bg3); }
    .mini-habit.done { background: var(--bg3); }
    .mini-check { width: 18px; height: 18px; border-radius: 50%; border: 1.5px solid var(--border2); display: flex; align-items: center; justify-content: center; flex-shrink: 0; transition: all 0.15s; }
    .mini-check.done { background: var(--green); border-color: var(--green); }
    .mini-check.done::after { content: '✓'; color: #fff; font-size: 0.65rem; }
    .mini-habit-time { font-family: 'DM Mono', monospace; font-size: 0.68rem; color: var(--gold); }

    /* DIARY */
    #diary-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 1rem; }
    #diary-date { font-size: 0.8rem; color: var(--muted); font-style: italic; }
    .mood-row { display: flex; gap: 0.4rem; flex-wrap: wrap; }
    .mood-btn { background: none; border: 1px solid var(--border); border-radius: 20px; padding: 0.25rem 0.55rem; font-size: 1.1rem; cursor: pointer; transition: all 0.15s; }
    .mood-btn.active { border-color: var(--gold); background: var(--bg3); }
    #diary-textarea { min-height: 200px; }
    #diary-actions { display: flex; align-items: center; justify-content: space-between; margin-top: 0.7rem; }
    .save-ok { font-size: 0.75rem; color: var(--green); opacity: 0; transition: opacity 0.3s; }
    .save-ok.show { opacity: 1; }
    .past-entry { padding: 0.75rem 0.85rem; background: var(--bg2); border-radius: 8px; margin-bottom: 0.5rem; border: 1px solid var(--border); cursor: pointer; transition: border-color 0.15s; }
    .past-entry:active { border-color: var(--border2); }
    .past-entry-meta { display: flex; justify-content: space-between; margin-bottom: 0.3rem; }
    .past-entry-date { font-size: 0.73rem; color: var(--faint); letter-spacing: 0.07em; }
    .past-entry-preview { font-size: 0.83rem; color: var(--muted); font-style: italic; line-height: 1.5; }

    /* HABITS */
    .habit-row { display: flex; align-items: center; justify-content: space-between; padding: 0.65rem 0.75rem; border-radius: 8px; cursor: pointer; transition: background 0.12s; border: 1px solid var(--border); margin-bottom: 0.35rem; background: var(--bg2); }
    .habit-row.done { background: var(--green3); border-color: var(--green2); }
    .habit-row:active { background: var(--bg3); }
    .habit-left { display: flex; align-items: center; gap: 0.75rem; flex: 1; min-width: 0; }
    .habit-check { width: 22px; height: 22px; border-radius: 50%; border: 1.5px solid var(--border2); display: flex; align-items: center; justify-content: center; flex-shrink: 0; transition: all 0.15s; }
    .habit-check.done { background: var(--green); border-color: var(--green); }
    .habit-check.done::after { content: '✓'; color: #fff; font-size: 0.75rem; }
    .habit-name { font-size: 0.92rem; color: var(--text3); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .habit-row.done .habit-name { color: var(--green); }
    .habit-right { display: flex; align-items: center; gap: 0.5rem; flex-shrink: 0; }
    .habit-time-badge { font-family: 'DM Mono', monospace; font-size: 0.68rem; color: var(--gold); background: var(--bg4); border-radius: 4px; padding: 0.15rem 0.4rem; cursor: pointer; }
    .streak-badge { font-family: 'DM Mono', monospace; font-size: 0.68rem; color: var(--gold); background: var(--bg4); border-radius: 10px; padding: 0.15rem 0.45rem; }

    #heatmap-grid { display: grid; grid-template-columns: repeat(7,1fr); gap: 3px; }
    .hmap-dow { text-align: center; font-size: 0.55rem; color: var(--ghost); padding: 2px 0; }
    .hmap-cell { aspect-ratio: 1; border-radius: 3px; cursor: pointer; border: 1px solid transparent; transition: transform 0.1s; }
    .hmap-cell.today-cell { border-color: var(--gold); }
    .hmap-cell:active { transform: scale(0.9); }

    /* MODAL */
    .modal-overlay { position: fixed; inset: 0; background: #2a221880; z-index: 100; display: flex; align-items: flex-end; opacity: 0; pointer-events: none; transition: opacity 0.2s; }
    .modal-overlay.open { opacity: 1; pointer-events: all; }
    .modal { background: var(--bg2); border-top: 1px solid var(--border); border-radius: 16px 16px 0 0; padding: 1.2rem; padding-bottom: calc(var(--safe-bot) + 1.2rem); width: 100%; transform: translateY(20px); transition: transform 0.2s; max-height: 85vh; overflow-y: auto; }
    .modal-overlay.open .modal { transform: translateY(0); }
    .modal h3 { font-size: 1rem; font-weight: 400; color: var(--text2); margin-bottom: 0.3rem; }
    .modal-row { display: flex; gap: 0.5rem; margin-bottom: 0.6rem; }
    .day-row { display: flex; align-items: center; gap: 0.6rem; padding: 0.5rem 0; border-bottom: 1px solid var(--bg4); }
    .day-toggle { width: 34px; height: 20px; border-radius: 10px; background: var(--bg4); border: 1.5px solid var(--border); cursor: pointer; position: relative; transition: background 0.2s; flex-shrink: 0; }
    .day-toggle.on { background: var(--green); border-color: var(--green); }
    .day-toggle::after { content:''; position:absolute; width:14px; height:14px; border-radius:50%; background:#fff; top:1px; left:1px; transition:left 0.2s; }
    .day-toggle.on::after { left:15px; }
    .day-name { font-size:0.88rem; color:var(--text3); width:36px; flex-shrink:0; }
    .day-time { font-family:'DM Mono',monospace; font-size:0.82rem; background:var(--bg3); border:1px solid var(--border); color:var(--text); border-radius:5px; padding:0.25rem 0.4rem; outline:none; width:90px; transition: opacity 0.2s; }
    .day-time:disabled { opacity:0.3; }
    .day-time:focus { border-color:var(--gold); }

    ::-webkit-scrollbar { width: 3px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 2px; }
  </style>
</head>
<body>
<div id="app">
  <div id="header">
    <div id="header-top">
      <h1>Life <em>Hub</em></h1>
      <span id="today-label"></span>
    </div>
    <div id="tabs">
      <button class="tab-btn active" data-tab="calendar">Calendar</button>
      <button class="tab-btn" data-tab="diary">Diary</button>
      <button class="tab-btn" data-tab="habits">Habits</button>
    </div>
  </div>

  <div id="content">
    <!-- CALENDAR -->
    <div id="panel-calendar" class="panel active">
      <div id="cal-nav">
        <button class="nav-btn" id="prev-month">←</button>
        <span id="cal-month-label"></span>
        <button class="nav-btn" id="next-month">→</button>
      </div>
      <div id="cal-grid"></div>
      <div id="day-detail">
        <div id="day-detail-date"></div>
        <div class="section-label">Events</div>
        <div id="events-list"></div>
        <div class="add-form">
          <div class="add-form-row">
            <input class="inp" type="time" id="new-event-time" style="width:110px;flex-shrink:0" />
            <input class="inp" type="text" id="new-event-name" placeholder="Add event…" />
          </div>
          <button class="btn" id="add-event-btn" style="align-self:flex-end">+ Add</button>
        </div>
        <div class="section-label" style="margin-top:1.2rem">Habits</div>
        <div id="cal-habits-list"></div>
      </div>
    </div>

    <!-- DIARY -->
    <div id="panel-diary" class="panel">
      <div id="diary-header">
        <div>
          <div class="section-label" style="margin-bottom:0.1rem">Entry</div>
          <div id="diary-date"></div>
        </div>
        <div class="mood-row" id="mood-row"></div>
      </div>
      <textarea class="inp" id="diary-textarea" placeholder="What's on your mind today…"></textarea>
      <div id="diary-actions">
        <span class="save-ok" id="save-ok">✓ Saved</span>
        <button class="btn" id="save-diary-btn">Save</button>
      </div>
      <div style="margin-top:2rem">
        <div class="section-label">Past Entries</div>
        <div id="past-entries"></div>
      </div>
    </div>

    <!-- HABITS -->
    <div id="panel-habits" class="panel">
      <div class="row" style="justify-content:space-between;margin-bottom:0.4rem">
        <div class="section-label" style="margin:0">Today</div>
        <span class="mono" id="habit-count" style="font-size:0.75rem;color:var(--gold)"></span>
      </div>
      <div class="progress-bar" style="margin-bottom:1rem"><div class="progress-fill" id="habit-progress"></div></div>
      <div id="habits-list"></div>
      <div class="row" style="margin-top:0.8rem;gap:0.4rem">
        <input class="inp" type="text" id="new-habit-name" placeholder="New habit… (schedule opens after)" style="flex:1" />
        <button class="btn" id="add-habit-btn">+</button>
      </div>
      <div style="margin-top:1.8rem">
        <div class="row" style="justify-content:space-between;margin-bottom:0.4rem">
          <div class="section-label" style="margin:0" id="heatmap-label"></div>
          <span class="mono" id="heatmap-pct" style="font-size:0.75rem;color:var(--gold)"></span>
        </div>
        <div class="progress-bar" style="margin-bottom:0.8rem"><div class="progress-fill" id="heatmap-progress"></div></div>
        <div id="heatmap-grid"></div>
        <div class="row" style="margin-top:0.5rem;gap:0.4rem">
          <span style="font-size:0.62rem;color:var(--ghost)">0%</span>
          <div style="width:10px;height:10px;border-radius:2px;background:#e4d9c8"></div>
          <div style="width:10px;height:10px;border-radius:2px;background:#c8ddb8"></div>
          <div style="width:10px;height:10px;border-radius:2px;background:#8ab870"></div>
          <div style="width:10px;height:10px;border-radius:2px;background:#4a7030"></div>
          <span style="font-size:0.62rem;color:var(--ghost)">100%</span>
        </div>
      </div>
      <div style="margin-top:1.5rem">
        <div class="section-label">Streaks</div>
        <div id="streaks-list"></div>
      </div>
    </div>
  </div>
</div>

<!-- Habit Schedule Modal -->
<div class="modal-overlay" id="habit-modal">
  <div class="modal">
    <h3 id="modal-title">Schedule Habit</h3>
    <p style="font-size:0.8rem;color:var(--muted);margin-bottom:1rem">Toggle days on/off and set a time for each.</p>
    <div id="modal-days"></div>
    <div class="modal-row" style="justify-content:flex-end;gap:0.6rem;margin-top:0.8rem">
      <button class="btn-ghost" id="modal-cancel">Cancel</button>
      <button class="btn" id="modal-save">Save</button>
    </div>
  </div>
</div>

<script>
const DAYS_SHORT = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
const MONTHS = ['January','February','March','April','May','June','July','August','September','October','November','December'];
const MOODS = ['😊','😐','😔','🔥','💭','🌿'];
const DEFAULT_HABITS = [
  { name: 'Morning walk',  schedule: {1:'07:00',2:'07:00',3:'07:00',4:'07:00',5:'07:00'} },
  { name: 'Read 30min',    schedule: {0:'21:00',1:'21:00',2:'21:00',3:'21:00',4:'21:00',5:'21:00',6:'21:00'} },
  { name: 'Drink 2L water',schedule: {0:'',1:'',2:'',3:'',4:'',5:'',6:''} },
  { name: 'Meditate',      schedule: {1:'07:30',2:'07:30',3:'07:30',4:'07:30',5:'07:30'} },
];

function load(k, def) { try { const v = localStorage.getItem(k); return v ? JSON.parse(v) : def; } catch { return def; } }
function save(k, v) { try { localStorage.setItem(k, JSON.stringify(v)); } catch {} }

function dateKey(d) {
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}
function parseKey(k) { const [y,m,d] = k.split('-'); return new Date(+y,+m-1,+d); }
function fmtKey(k) { return parseKey(k).toLocaleDateString('en-US',{weekday:'long',year:'numeric',month:'long',day:'numeric'}); }
function todayKey() { return dateKey(new Date()); }

let state = {
  tab: 'calendar',
  viewYear: new Date().getFullYear(),
  viewMonth: new Date().getMonth(),
  selectedDate: todayKey(),
  events: load('lh_events', {}),
  diary: load('lh_diary', {}),
  habitData: load('lh_habit_data', {}),
  habits: load('lh_habits', DEFAULT_HABITS),
  diaryMood: '😊',
};

// Tabs
document.querySelectorAll('.tab-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    state.tab = btn.dataset.tab;
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.toggle('active', b===btn));
    document.querySelectorAll('.panel').forEach(p => p.classList.toggle('active', p.id==='panel-'+state.tab));
    renderActive();
  });
});

document.getElementById('today-label').textContent = new Date().toLocaleDateString('en-US',{weekday:'long',month:'short',day:'numeric'});

// ── CALENDAR ──
function renderCalendar() {
  const { viewYear: y, viewMonth: m, selectedDate } = state;
  document.getElementById('cal-month-label').innerHTML =
    `${MONTHS[m]} <span class="mono" style="color:var(--gold);font-weight:300">${y}</span>`;
  const grid = document.getElementById('cal-grid');
  grid.innerHTML = '';
  DAYS_SHORT.forEach(d => {
    const el = document.createElement('div'); el.className = 'cal-dow'; el.textContent = d[0]; grid.appendChild(el);
  });
  const firstDay = new Date(y, m, 1).getDay();
  const daysInMonth = new Date(y, m+1, 0).getDate();
  const today = todayKey();
  for (let i=0; i<firstDay; i++) { const el=document.createElement('div'); el.className='cal-day other-month'; grid.appendChild(el); }
  for (let d=1; d<=daysInMonth; d++) {
    const k = `${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const el = document.createElement('div');
    el.className = 'cal-day'+(k===today?' today':'')+(k===selectedDate?' selected':'');
    el.innerHTML = `<span>${d}</span><div class="dot-row">${getDots(k)}</div>`;
    el.addEventListener('click', () => { state.selectedDate=k; renderCalendar(); renderDayDetail(); });
    grid.appendChild(el);
  }
  renderDayDetail();
}

function getDots(k) {
  let html = '';
  if ((state.events[k]||[]).length > 0) html += `<div class="dot" style="background:var(--gold)"></div>`;
  if (state.diary[k]) html += `<div class="dot" style="background:var(--blue)"></div>`;
  if (state.habits.filter(h => state.habitData[k]?.[h.name]).length > 0) html += `<div class="dot" style="background:var(--green)"></div>`;
  return html;
}

function renderDayDetail() {
  const k = state.selectedDate;
  document.getElementById('day-detail-date').textContent = fmtKey(k);
  const evList = document.getElementById('events-list');
  evList.innerHTML = '';
  const evs = (state.events[k]||[]).slice().sort((a,b)=>(a.time||'99:99').localeCompare(b.time||'99:99'));
  if (!evs.length) evList.innerHTML = `<div style="font-size:0.82rem;color:var(--ghost);font-style:italic;margin-bottom:0.4rem">No events</div>`;
  evs.forEach((ev, i) => {
    const el = document.createElement('div'); el.className = 'event-item';
    el.innerHTML = `<div class="event-item-left">${ev.time?`<span class="event-time">${ev.time}</span>`:''}<span class="event-name">${ev.name}</span></div><button class="icon-btn">✕</button>`;
    el.querySelector('.icon-btn').addEventListener('click', e => { e.stopPropagation(); removeEvent(k,i); });
    evList.appendChild(el);
  });
  const habList = document.getElementById('cal-habits-list');
  habList.innerHTML = '';
  habitsForDate(k).forEach(h => {
    const done = !!state.habitData[k]?.[h.name];
    const timeStr = habitTime(h, k);
    const el = document.createElement('div');
    el.className = 'mini-habit'+(done?' done':'');
    el.innerHTML = `<div class="row" style="gap:0.6rem"><div class="mini-check ${done?'done':''}"></div><span style="font-size:0.88rem;color:${done?'var(--green)':'var(--muted)'}">${h.name}</span></div>${timeStr?`<span class="mini-habit-time">${timeStr}</span>`:''}`;
    el.addEventListener('click', () => toggleHabit(k, h.name));
    habList.appendChild(el);
  });
  if (habitsForDate(k).length === 0) {
    habList.innerHTML = `<div style="font-size:0.82rem;color:var(--ghost);font-style:italic">No habits scheduled.</div>`;
  }
}

document.getElementById('prev-month').addEventListener('click', () => {
  if (state.viewMonth===0) { state.viewMonth=11; state.viewYear--; } else state.viewMonth--;
  renderCalendar();
});
document.getElementById('next-month').addEventListener('click', () => {
  if (state.viewMonth===11) { state.viewMonth=0; state.viewYear++; } else state.viewMonth++;
  renderCalendar();
});
document.getElementById('add-event-btn').addEventListener('click', addEvent);
document.getElementById('new-event-name').addEventListener('keydown', e => { if(e.key==='Enter') addEvent(); });

function addEvent() {
  const name = document.getElementById('new-event-name').value.trim();
  const time = document.getElementById('new-event-time').value;
  if (!name) return;
  const k = state.selectedDate;
  state.events[k] = [...(state.events[k]||[]), { name, time }];
  save('lh_events', state.events);
  document.getElementById('new-event-name').value = '';
  document.getElementById('new-event-time').value = '';
  renderDayDetail(); renderCalendar();
}

function removeEvent(k, idx) {
  state.events[k].splice(idx, 1);
  save('lh_events', state.events);
  renderDayDetail(); renderCalendar();
}

// ── DIARY ──
function renderDiary() {
  document.getElementById('diary-date').textContent = fmtKey(state.selectedDate);
  const entry = state.diary[state.selectedDate];
  document.getElementById('diary-textarea').value = entry ? entry.text : '';
  state.diaryMood = entry ? entry.mood : '😊';
  const mr = document.getElementById('mood-row');
  mr.innerHTML = '';
  MOODS.forEach(m => {
    const btn = document.createElement('button');
    btn.className = 'mood-btn'+(state.diaryMood===m?' active':'');
    btn.textContent = m;
    btn.addEventListener('click', () => { state.diaryMood=m; renderDiary(); });
    mr.appendChild(btn);
  });
  const pe = document.getElementById('past-entries');
  pe.innerHTML = '';
  const entries = Object.entries(state.diary).filter(([k])=>k!==state.selectedDate).sort(([a],[b])=>b.localeCompare(a)).slice(0,8);
  if (!entries.length) { pe.innerHTML=`<div style="font-size:0.83rem;color:var(--ghost);font-style:italic">No past entries yet.</div>`; return; }
  entries.forEach(([k,v]) => {
    const el = document.createElement('div'); el.className='past-entry';
    el.innerHTML=`<div class="past-entry-meta"><span class="past-entry-date">${parseKey(k).toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'})}</span><span>${v.mood}</span></div><div class="past-entry-preview">${v.text.slice(0,90)}${v.text.length>90?'…':''}</div>`;
    el.addEventListener('click', () => { state.selectedDate=k; renderDiary(); });
    pe.appendChild(el);
  });
}

document.getElementById('save-diary-btn').addEventListener('click', () => {
  const text = document.getElementById('diary-textarea').value;
  state.diary[state.selectedDate] = { text, mood: state.diaryMood };
  save('lh_diary', state.diary);
  const ok = document.getElementById('save-ok');
  ok.classList.add('show'); setTimeout(()=>ok.classList.remove('show'),1600);
  renderCalendar();
});

// ── HABITS ──
let editingHabitIdx = null;
let modalSchedule = {}; // working copy while modal is open

// Returns true if a habit is scheduled for a given date string
function isScheduled(habit, dateStr) {
  const dow = parseKey(dateStr).getDay(); // 0=Sun
  return habit.schedule && habit.schedule[dow] !== undefined;
}

// Returns the time for a habit on a given date (or '')
function habitTime(habit, dateStr) {
  const dow = parseKey(dateStr).getDay();
  return (habit.schedule && habit.schedule[dow]) || '';
}

// Habits scheduled for today
function habitsForDate(dateStr) {
  return state.habits.filter(h => isScheduled(h, dateStr));
}

function toggleHabit(dateStr, habitName) {
  if (!state.habitData[dateStr]) state.habitData[dateStr] = {};
  state.habitData[dateStr][habitName] = !state.habitData[dateStr][habitName];
  save('lh_habit_data', state.habitData);
  renderHabits(); renderCalendar();
}

function getStreak(habitName) {
  const habit = state.habits.find(h => h.name === habitName);
  if (!habit) return 0;
  let streak = 0;
  const d = new Date();
  while (true) {
    const k = dateKey(d);
    if (isScheduled(habit, k) && state.habitData[k]?.[habitName]) { streak++; d.setDate(d.getDate()-1); }
    else if (isScheduled(habit, k)) break; // scheduled but not done — streak ends
    else d.setDate(d.getDate()-1); // not scheduled that day — skip
    if (streak > 365) break;
  }
  return streak;
}

function scheduleLabel(habit) {
  if (!habit.schedule) return 'Every day';
  const days = Object.keys(habit.schedule).map(Number);
  if (days.length === 0) return 'Not scheduled';
  if (days.length === 7) return 'Every day';
  const names = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
  if (days.length <= 3) return days.sort((a,b)=>a-b).map(d=>names[d]).join(', ');
  if (days.join(',') === '1,2,3,4,5') return 'Weekdays';
  if (days.join(',') === '0,6') return 'Weekends';
  return days.length + ' days/week';
}

function renderHabits() {
  const todayK = todayKey();
  const todayHabits = habitsForDate(todayK);
  const done = todayHabits.filter(h => state.habitData[todayK]?.[h.name]).length;
  const total = todayHabits.length;
  document.getElementById('habit-count').textContent = `${done}/${total}`;
  document.getElementById('habit-progress').style.width = `${total===0?0:Math.round(done/total*100)}%`;

  const list = document.getElementById('habits-list');
  list.innerHTML = '';
  state.habits.forEach((h, idx) => {
    const scheduledToday = isScheduled(h, todayK);
    const isDone = scheduledToday && !!state.habitData[todayK]?.[h.name];
    const timeStr = habitTime(h, todayK);
    const el = document.createElement('div');
    el.className = 'habit-row'+(isDone?' done':'')+(scheduledToday?'':' not-today');
    el.style.opacity = scheduledToday ? '1' : '0.45';
    el.innerHTML = `
      <div class="habit-left">
        <div class="habit-check ${isDone?'done':''}"></div>
        <div>
          <div class="habit-name">${h.name}</div>
          <div style="font-size:0.68rem;color:var(--faint);margin-top:1px">${scheduleLabel(h)}</div>
        </div>
      </div>
      <div class="habit-right">
        ${timeStr ? `<span class="habit-time-badge">${timeStr}</span>` : ''}
        <button class="btn-ghost" style="font-size:0.68rem;padding:0.2rem 0.5rem" data-edit="${idx}">⚙</button>
        <button class="icon-btn" data-del="${idx}">✕</button>
      </div>`;
    el.addEventListener('click', e => {
      if (e.target.dataset.del!==undefined || e.target.dataset.edit!==undefined) return;
      if (!scheduledToday) return;
      toggleHabit(todayK, h.name);
    });
    el.querySelector('[data-del]')?.addEventListener('click', e => {
      e.stopPropagation();
      state.habits.splice(idx,1); save('lh_habits',state.habits); renderHabits(); renderCalendar();
    });
    el.querySelector('[data-edit]')?.addEventListener('click', e => {
      e.stopPropagation(); openHabitModal(idx);
    });
    list.appendChild(el);
  });

  // Heatmap — only count days where at least one habit was scheduled
  const { viewYear: y, viewMonth: m } = state;
  document.getElementById('heatmap-label').textContent = `${MONTHS[m]} overview`;
  const daysInMonth = new Date(y,m+1,0).getDate();
  const firstDay = new Date(y,m,1).getDay();
  let total2=0, done2=0;
  for(let d=1;d<=daysInMonth;d++){
    const k=`${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const scheduled = habitsForDate(k);
    total2 += scheduled.length;
    done2 += scheduled.filter(h=>state.habitData[k]?.[h.name]).length;
  }
  const pct = total2===0?0:Math.round(done2/total2*100);
  document.getElementById('heatmap-pct').textContent = `${pct}%`;
  document.getElementById('heatmap-progress').style.width = `${pct}%`;

  const hg = document.getElementById('heatmap-grid');
  hg.innerHTML = '';
  DAYS_SHORT.forEach(d => { const el=document.createElement('div'); el.className='hmap-dow'; el.textContent=d[0]; hg.appendChild(el); });
  const today = todayKey();
  for(let i=0;i<firstDay;i++){const el=document.createElement('div');hg.appendChild(el);}
  for(let d=1;d<=daysInMonth;d++){
    const k=`${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const scheduled = habitsForDate(k);
    const p = scheduled.length===0 ? 0 : scheduled.filter(h=>state.habitData[k]?.[h.name]).length/scheduled.length;
    const bg = scheduled.length===0?'#f0ead8':p===0?'#e4d9c8':p<0.34?'#c8ddb8':p<0.67?'#8ab870':'#4a7030';
    const el=document.createElement('div');
    el.className='hmap-cell'+(k===today?' today-cell':'');
    el.style.background=bg;
    el.title=`${MONTHS[m]} ${d}: ${scheduled.filter(h=>state.habitData[k]?.[h.name]).length}/${scheduled.length}`;
    el.addEventListener('click',()=>{ state.selectedDate=k; document.querySelector('[data-tab="calendar"]').click(); });
    hg.appendChild(el);
  }

  const sl = document.getElementById('streaks-list');
  sl.innerHTML = '';
  state.habits.forEach(h => {
    const streak=getStreak(h.name);
    const monthDone=Array.from({length:daysInMonth},(_,i)=>i+1)
      .filter(d => {
        const k=`${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
        return isScheduled(h,k) && state.habitData[k]?.[h.name];
      }).length;
    const scheduledDays=Array.from({length:daysInMonth},(_,i)=>i+1)
      .filter(d=>isScheduled(h,`${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`)).length;
    const el=document.createElement('div');
    el.style.cssText='display:flex;align-items:center;justify-content:space-between;padding:0.4rem 0;border-bottom:1px solid var(--bg4)';
    el.innerHTML=`
      <div>
        <div style="font-size:0.85rem;color:var(--muted)">${h.name}</div>
        <div style="font-size:0.67rem;color:var(--faint)">${scheduleLabel(h)}</div>
      </div>
      <div class="row" style="gap:0.5rem">
        <span class="mono" style="font-size:0.7rem;color:var(--faint)">${monthDone}/${scheduledDays}d</span>
        ${streak>0?`<span class="streak-badge">🔥${streak}</span>`:''}
      </div>`;
    sl.appendChild(el);
  });
}

document.getElementById('add-habit-btn').addEventListener('click', () => {
  const name=document.getElementById('new-habit-name').value.trim();
  if(!name) return;
  // Default: every day, no time set
  const schedule = {0:'',1:'',2:'',3:'',4:'',5:'',6:''};
  state.habits.push({name, schedule});
  save('lh_habits',state.habits);
  document.getElementById('new-habit-name').value='';
  renderHabits();
  // Open modal immediately so user can set their schedule
  openHabitModal(state.habits.length-1);
});
document.getElementById('new-habit-name').addEventListener('keydown', e => { if(e.key==='Enter') document.getElementById('add-habit-btn').click(); });

function openHabitModal(idx) {
  editingHabitIdx = idx;
  const h = state.habits[idx];
  document.getElementById('modal-title').textContent = h.name;
  // Deep copy schedule
  modalSchedule = h.schedule ? JSON.parse(JSON.stringify(h.schedule)) : {};

  const container = document.getElementById('modal-days');
  container.innerHTML = '';
  const dayNames = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
  for (let dow = 0; dow < 7; dow++) {
    const isOn = modalSchedule[dow] !== undefined;
    const timeVal = isOn ? (modalSchedule[dow] || '') : '';
    const row = document.createElement('div');
    row.className = 'day-row';
    row.innerHTML = `
      <div class="day-toggle ${isOn?'on':''}" data-dow="${dow}"></div>
      <span class="day-name">${dayNames[dow].slice(0,3)}</span>
      <input type="time" class="day-time" data-dow="${dow}" value="${timeVal}" ${isOn?'':'disabled'} />`;
    row.querySelector('.day-toggle').addEventListener('click', function() {
      const d = +this.dataset.dow;
      const timeInput = row.querySelector('.day-time');
      if (modalSchedule[d] !== undefined) {
        delete modalSchedule[d];
        this.classList.remove('on');
        timeInput.disabled = true;
        timeInput.value = '';
      } else {
        modalSchedule[d] = '';
        this.classList.add('on');
        timeInput.disabled = false;
      }
    });
    row.querySelector('.day-time').addEventListener('change', function() {
      const d = +this.dataset.dow;
      if (modalSchedule[d] !== undefined) modalSchedule[d] = this.value;
    });
    container.appendChild(row);
  }
  document.getElementById('habit-modal').classList.add('open');
}

document.getElementById('modal-cancel').addEventListener('click', () => {
  document.getElementById('habit-modal').classList.remove('open');
});
document.getElementById('modal-save').addEventListener('click', () => {
  if (editingHabitIdx === null) return;
  state.habits[editingHabitIdx].schedule = modalSchedule;
  save('lh_habits', state.habits);
  document.getElementById('habit-modal').classList.remove('open');
  renderHabits(); renderCalendar();
});
document.getElementById('habit-modal').addEventListener('click', e => {
  if (e.target === e.currentTarget) e.currentTarget.classList.remove('open');
});

function renderActive() {
  if(state.tab==='calendar') renderCalendar();
  else if(state.tab==='diary') renderDiary();
  else if(state.tab==='habits') renderHabits();
}

renderCalendar();

if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('/lifehub/sw.js', { scope: '/lifehub/' }).catch(() => {});
}
</script>
